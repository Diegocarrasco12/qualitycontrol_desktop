<div class="module">

    <!-- ========================= -->
    <!-- HEADER -->
    <!-- ========================= -->
    <div class="module-header">
        <div class="module-title">🧼 Lavado de BINS</div>

        <div class="module-actions">
            <button class="btn-primary" id="btnBuscar">Filtrar</button>
            <button class="btn-secondary" id="btnLimpiar">🧹 Limpiar</button>
            <button class="btn-secondary" id="btnExportar">📤 Exportar</button>
        </div>
    </div>

    <!-- ========================= -->
    <!-- FILTROS -->
    <!-- ========================= -->
    <div class="filters">

        <input type="text" id="fechaDesde" placeholder="Fecha desde">
        <input type="text" id="fechaHasta" placeholder="Fecha hasta">

        <input type="text" id="filtroBin" placeholder="Bin / Nº / ID">
        <input type="text" id="filtroCalle" placeholder="Calle">
        <input type="text" id="filtroDocumento" placeholder="Documento">

    </div>

    <!-- ========================= -->
    <!-- KPIs -->
    <!-- ========================= -->
    <div class="kpi-row">

        <div class="kpi-card">
            <div class="kpi-label">Lavados Hoy</div>
            <div class="kpi-value" id="kpiTotal">0</div>
        </div>

    </div>

    <!-- ========================= -->
    <!-- TABLA -->
    <!-- ========================= -->
    <div class="table-container">

        <table id="tablaBinsLavado" class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Fecha</th>
                    <th>N° BIN</th>
                    <th>Documento</th>
                    <th>Proveedor</th>
                    <th>Estado</th>
                    <th>BIN</th>
                    <th>Calle</th>
                    <th>Tipo</th>
                    <th>Archivo</th>
                </tr>
            </thead>

            <tbody id="binsLavadoTableBody">
                <tr>
                    <td colspan="10">Cargando...</td>
                </tr>
            </tbody>
        </table>

    </div>

    <!-- ========================= -->
    <!-- PAGINACIÓN -->
    <!-- ========================= -->
    <div class="pagination" id="paginacion"></div>

</div>
