<div class="module">

    <!-- ========================= -->
    <!-- HEADER -->
    <!-- ========================= -->
    <div class="module-header">

        <div class="module-title">
            📦 Consumo Papel
        </div>

        <div class="module-actions">
            <button class="btn-secondary" id="btnExportar">📤 Exportar</button>
            <button class="btn-primary" id="btnGuardar">💾 Guardar Cambios</button>
            <button class="btn-secondary" id="btnActualizar">🔄 Actualizar</button>
        </div>

    </div>

    <!-- ========================= -->
    <!-- KPIs -->
    <!-- ========================= -->
    <div class="kpi-row">

        <div class="kpi-card">
            <div class="kpi-label">Consumo Hoy</div>
            <div class="kpi-value" id="kpiConsumoHoy">-- kg</div>
        </div>

        <div class="kpi-card">
            <div class="kpi-label">Tarjas Escaneadas</div>
            <div class="kpi-value" id="kpiTarjasHoy">--</div>
        </div>

        <div class="kpi-card">
            <div class="kpi-label">Saldo Total</div>
            <div class="kpi-value" id="kpiSaldoTotal">-- kg</div>
        </div>

        <div class="kpi-card">
            <div class="kpi-label">Último Registro</div>
            <div class="kpi-value" id="kpiUltimoRegistro">--</div>
        </div>

    </div>

    <!-- ========================= -->
    <!-- CARD PRINCIPAL -->
    <!-- ========================= -->
    <div class="card">

        <!-- ========================= -->
        <!-- FILTROS -->
        <!-- ========================= -->
        <div class="filters">

            <input type="text" id="filtroFechaDesde" placeholder="📅 Fecha desde">
            <input type="text" id="filtroFechaHasta" placeholder="📅 Fecha hasta">
            <input type="text" id="filtroCodigo" placeholder="🔎 Código producto">
            <input type="text" id="filtroLote" placeholder="📦 Lote">

            <button class="btn-primary" id="btnFiltrar">Filtrar</button>
            <button class="btn-secondary" id="btnLimpiar">Limpiar</button>

        </div>

        <!-- ========================= -->
        <!-- TABLA -->
        <!-- ========================= -->
        <div class="table-container">

            <table class="table">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Fecha</th>
                        <th>Descripción</th>
                        <th>Código</th>
                        <th>Consumo (kg)</th>
                        <th>NP</th>
                        <th>Tarja (kg)</th>
                        <th>Saldo (kg)</th>
                        <th>Lote</th>
                        <th>Ubicación</th>
                        <th>Estado</th>
                        <th>Salida</th>
                    </tr>
                </thead>

                <tbody id="tablaConsumos">

                    <!-- 🔥 ESTADO INICIAL -->
                    <tr id="loadingRow">
                        <td colspan="12" class="loading">                            ⏳ Cargando datos...
                        </td>
                    </tr>

                </tbody>

            </table>

        </div>

        <!-- ========================= -->
        <!-- SIN DATOS -->
        <!-- ========================= -->
        <div id="sinDatos" class="empty-state" style="display:none;">
            📭 No se encontraron resultados
        </div>

        <!-- ========================= -->
        <!-- PAGINACIÓN -->
        <!-- ========================= -->
        <div class="pagination" id="pagination"></div>

    </div>

</div>
