<div class="centered-module-wrapper">

    <div class="module centered-module">
    <h2 style="color:#00c853;">🖨 Impresión QR BINS</h2>

    <div style="max-width:420px; margin-top:20px;">
        <label style="display:block; font-weight:bold; margin-bottom:8px;">
            Número de BIN
        </label>

        <input
            id="binsPrintInput"
            type="text"
            placeholder="Ej: 833"
            style="
                width:100%;
                padding:14px;
                font-size:28px;
                font-weight:bold;
                text-align:center;
                border:2px solid #ccc;
                border-radius:8px;
                margin-bottom:16px;
            "
        />

        <button
            id="binsPrintBtn"
            style="
                width:100%;
                padding:14px;
                font-size:18px;
                font-weight:bold;
                background:#16a34a;
                color:white;
                border:none;
                border-radius:8px;
                cursor:pointer;
            "
        >
            IMPRIMIR QR
        </button>

        <div
            id="binsPrintMsg"
            style="margin-top:16px; font-weight:bold;"
        ></div>
    </div>
</div>
